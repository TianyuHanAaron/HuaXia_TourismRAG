services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - app
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
      - redis

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    profiles:
      - app
    environment:
      STREAMLIT_API_BASE_URL: http://api:8000
      PORT: 8501
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  qdrant_storage:
  redis_data:
